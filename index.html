<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="src/scss/main.scss"
    />
    <title>MakeUpBuddy - Your Beauty Knowledge Advisor</title>
    <script>
      const makeupData = async function () {
        const response = await fetch(
          'http://makeup-api.herokuapp.com/api/v1/products.json?product_type=eyeliner',
        );
        const data = await response.json();
        console.log(data[0].api_featured_image);
        document.querySelector('.picture').src = data[3].api_featured_image;
      };
      makeupData();
    </script>
  </head>
  <body>
    <header class="header">
      <h1 class="header__logo">MakeupBuddy</h1>
      <form>
        <input
          type="text"
          class="header__searchbox"
          placeholder="... Search for product"
        />
      </form>
      <div class="header__bookmarks">Bookmarks</div>
    </header>
    <!-- <img
      alt=""
      class="picture"
    /> -->
  </body>
</html>
